retargeting:
  finger_tip_link_names:
  - right_ability_hand_thumb_anchor
  - right_ability_hand_index_anchor
  - right_ability_hand_middle_anchor
  - right_ability_hand_ring_anchor
  - right_ability_hand_pinky_anchor
  # DexPilot pinch projection: latch fingers to contact below project_dist,
  # release above escape_dist. The library defaults (0.03 / 0.05) latch the
  # hand closed and only release once the operator's fingertips spread past
  # 5 cm, which markerless (Captury) finger tracking often never reports on an
  # open hand -> the hand gets "stuck closed". Tightened so pinch engages only
  # near true contact and releases as soon as the hand starts opening.
  project_dist: 0.015
  escape_dist: 0.025
  # Snappier open/close. low_pass_alpha is the LPFilter step fraction
  # (y += alpha*(x-y)); 0.2 corrects only 20%/step and feels sluggish/stuck.
  low_pass_alpha: 0.5
  scaling_factor: 1.2
  target_joint_names:
  - right_ability_hand_index_q1
  - right_ability_hand_middle_q1
  - right_ability_hand_ring_q1
  - right_ability_hand_pinky_q1
  - right_ability_hand_thumb_q1
  - right_ability_hand_thumb_q2
  type: DexPilot
  urdf_path: ability_hand_right_large.urdf
  wrist_link_name: right_ability_hand_base
