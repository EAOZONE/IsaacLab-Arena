# Gr00tRemoteClosedloopPolicy config for checkpoints fine-tuned on H2Ozone/lever_eef.
language_instruction: "Pull the lever."
action_horizon: 16
embodiment_tag: NEW_EMBODIMENT
video_backend: decord
modality_config_path: isaaclab_arena_gr00t/embodiments/alex/alex_lever_eef_data_config.py

policy_joints_config_path: isaaclab_arena_gr00t/embodiments/alex/alex_gr00t_joint_space.yaml
action_joints_config_path: isaaclab_arena_gr00t/embodiments/alex/alex_34dof_eef_teleop_action_joint_space.yaml
state_joints_config_path: isaaclab_arena_gr00t/embodiments/alex/alex_49dof_joint_space.yaml

action_chunk_length: 8
# The lever_eef dataset was recorded at 30 Hz; the sim steps at 50 Hz. Pace chunk consumption
# so each waypoint is held ~50/30 sim steps (zero-order hold), playing the chunk at real speed.
policy_control_hz: 30
task_mode_name: alex_tabletop_manipulation

pov_cam_name_sim:
  - zed_left_cam_rgb
  - zed_right_cam_rgb

original_image_size: [480, 640, 3]
target_image_size: [480, 640, 3]
